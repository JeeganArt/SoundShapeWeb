<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centered Blob Drone</title>
<style>
  :root {
    --bg: #07111a;
    --bg2: #0f2430;
    --panel: rgba(10, 22, 31, 0.72);
    --line: rgba(154, 230, 255, 0.16);
    --text: #d6edf5;
    --muted: #7fa1ad;
    --accent: #7cf6d8;
    --accent2: #6eb2ff;
    --accent3: #ffc77b;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 42%, rgba(110, 178, 255, 0.2), transparent 28%),
      radial-gradient(circle at 18% 18%, rgba(124, 246, 216, 0.12), transparent 20%),
      radial-gradient(circle at 82% 78%, rgba(255, 199, 123, 0.1), transparent 18%),
      linear-gradient(180deg, var(--bg2), var(--bg));
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    touch-action: none;
  }

  body {
    position: relative;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.18;
    filter: saturate(0.7) contrast(1.1) brightness(0.8);
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .sound-panel {
    position: absolute;
    right: 20px;
    bottom: 18px;
    pointer-events: none;
  }

  .card {
    min-width: 210px;
    max-width: min(360px, 42vw);
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--panel);
    backdrop-filter: blur(18px);
    box-shadow: 0 14px 42px rgba(0, 0, 0, 0.26);
  }

  .title {
    font-size: 14px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(2, minmax(90px, 1fr));
    gap: 8px 14px;
  }

  .stat {
    font-size: 12px;
    line-height: 1.35;
    color: var(--muted);
  }

  .stat strong {
    color: var(--text);
    font-weight: 600;
  }

  .stat-value {
    display: block;
    margin-top: 2px;
    font-size: 18px;
    color: var(--text);
  }

  .start-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(4, 9, 13, 0.34);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .start-btn {
    pointer-events: auto;
    border: 1px solid rgba(255, 255, 255, 0.18);
    border-radius: 999px;
    padding: 16px 26px;
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: rgba(6, 14, 20, 0.74);
    color: var(--text);
    backdrop-filter: blur(18px);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
    cursor: pointer;
    min-width: 200px;
  }

  .start-btn:disabled {
    opacity: 0.6;
    cursor: progress;
  }

  @media (max-width: 780px) {
    .sound-panel {
      right: 12px;
      bottom: 12px;
      left: 12px;
    }

    .card {
      max-width: none;
      min-width: 0;
    }
  }
</style>
</head>
<body>
<video id="webcam" autoplay playsinline muted></video>
<canvas id="scene"></canvas>

<div class="hud">
  <div class="sound-panel">
    <div class="card">
      <div class="title">Sound</div>
      <div class="stats">
        <div class="stat"><strong>Cutoff</strong><span class="stat-value" id="cutoffVal">20 Hz</span></div>
        <div class="stat"><strong>Reverb</strong><span class="stat-value" id="reverbVal">50%</span></div>
        <div class="stat"><strong>Grit</strong><span class="stat-value" id="gritVal">4%</span></div>
        <div class="stat"><strong>Detune</strong><span class="stat-value" id="detuneVal">0 ct</span></div>
      </div>
    </div>
  </div>
</div>

<div class="start-overlay" id="startOverlay">
  <button class="start-btn" id="startBtn">Start</button>
</div>

<script type="module">
  import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

  const video = document.getElementById("webcam");
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d");

  const POINTS = 88;
  const TAU = Math.PI * 2;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  let width = 0;
  let height = 0;
  let cx = 0;
  let cy = 0;
  let baseRadius = 0;
  let blobRadius = 0;
  let innerRadius = 0;
  let time = 0;

  const nodes = Array.from({ length: POINTS }, (_, i) => ({
    angle: (i / POINTS) * TAU,
    disp: 0,
    vel: 0
  }));

  let handLandmarker;
  let isRunning = false;
  let lastHandTime = 0;
  const pointMemory = new Map();
  const gripState = new Map(); // hysteresis: once pinched, stays engaged until fully released

  const state = {
    active: false,
    targetAngle: 0,
    targetPull: 0,
    pull: 0,
    pinch: 0,
    stretch: 0,
    radialVelocity: 0,
    tangentialVelocity: 0,
    energy: 0,
    detuneBias: 0,
    left: {
      x: 0,
      y: 0,
      pull: 0,
      pinch: 0,
      energy: 0
    },
    right: {
      x: 0,
      y: 0,
      pull: 0,
      pinch: 0,
      energy: 0
    },
    duoSpread: 0
  };

  const interactionPoints = [];

  let audioCtx;
  let analyser;
  let masterGain;
  let bodyGain;
  let shimmerSend;
  let dryGain;
  let filter1;
  let filter2;
  let waveshaper;
  let stereoPanner;
  let convolver;
  let lfo;
  let lfoDepth;
  let droneVoices = [];
  let started = false;

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function clamp(v, min, max) {
    return Math.min(max, Math.max(min, v));
  }

  function angleDelta(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= TAU;
    while (d < -Math.PI) d += TAU;
    return d;
  }

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.floor(width * DPR);
    canvas.height = Math.floor(height * DPR);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = width * 0.5;
    cy = height * 0.5;
    baseRadius = Math.min(width, height) * 0.18;
    blobRadius = baseRadius;
    innerRadius = baseRadius * 0.66;
  }

  function createShimmerIR(ctx, duration, decay, brightness) {
    const len = Math.floor(ctx.sampleRate * duration);
    const buffer = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        const t = i / ctx.sampleRate;
        const env = Math.pow(1 - i / len, decay);
        let sample = (Math.random() * 2 - 1) * env;
        sample += Math.sin(TAU * 1570 * t + ch * 0.6) * env * 0.02 * brightness;
        sample += Math.sin(TAU * 3180 * t + ch * 1.1) * env * 0.018 * brightness;
        sample += Math.sin(TAU * 5200 * t + ch * 1.7) * env * 0.014 * brightness;
        data[i] = sample * 0.42;
      }
    }
    return buffer;
  }

  function makeDistortionCurve(amount) {
    const samples = 4096;
    const curve = new Float32Array(samples);
    const k = amount * 120 + 1;
    for (let i = 0; i < samples; i++) {
      const x = (i * 2) / (samples - 1) - 1;
      curve[i] = ((1 + k) * x) / (1 + k * Math.abs(x));
    }
    return curve;
  }

  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    filter1 = audioCtx.createBiquadFilter();
    filter1.type = "lowpass";
    filter1.frequency.value = 420;
    filter1.Q.value = 0.9;

    filter2 = audioCtx.createBiquadFilter();
    filter2.type = "lowpass";
    filter2.frequency.value = 1200;
    filter2.Q.value = 0.4;

    waveshaper = audioCtx.createWaveShaper();
    waveshaper.curve = makeDistortionCurve(0.18);
    waveshaper.oversample = "4x";

    stereoPanner = audioCtx.createStereoPanner();
    stereoPanner.pan.value = 0;

    dryGain = audioCtx.createGain();
    dryGain.gain.value = 0.78;

    shimmerSend = audioCtx.createGain();
    shimmerSend.gain.value = 0.28;

    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.55;

    bodyGain = audioCtx.createGain();
    bodyGain.gain.value = 0.22;

    convolver = audioCtx.createConvolver();
    convolver.buffer = createShimmerIR(audioCtx, 4.2, 1.9, 1);

    const reverbBright = audioCtx.createBiquadFilter();
    reverbBright.type = "highpass";
    reverbBright.frequency.value = 280;
    reverbBright.Q.value = 0.5;

    const reverbShelf = audioCtx.createBiquadFilter();
    reverbShelf.type = "highshelf";
    reverbShelf.frequency.value = 2600;
    reverbShelf.gain.value = 5;

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    lfo = audioCtx.createOscillator();
    lfo.type = "sine";
    lfo.frequency.value = 0.18;
    lfoDepth = audioCtx.createGain();
    lfoDepth.gain.value = 6;
    lfo.connect(lfoDepth);
    lfoDepth.connect(filter1.detune);

    droneVoices = [
      { ratio: 1, gain: 0.21, type: "sawtooth", detune: -4 },
      { ratio: 1.5, gain: 0.09, type: "triangle", detune: 3 },
      { ratio: 2, gain: 0.06, type: "sine", detune: 6 }
    ].map((voice) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = voice.type;
      osc.frequency.value = 82.41 * voice.ratio;
      osc.detune.value = voice.detune;
      gain.gain.value = voice.gain;
      osc.connect(gain);
      gain.connect(bodyGain);
      osc.start();
      return { ...voice, osc, gain };
    });

    bodyGain.connect(waveshaper);
    waveshaper.connect(filter1);
    filter1.connect(filter2);
    filter2.connect(stereoPanner);
    stereoPanner.connect(dryGain);
    dryGain.connect(masterGain);
    filter2.connect(reverbBright);
    reverbBright.connect(convolver);
    convolver.connect(reverbShelf);
    reverbShelf.connect(shimmerSend);
    shimmerSend.connect(masterGain);
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);

    lfo.start();
  }

  function setText(id, value) {
    document.getElementById(id).textContent = value;
  }

  function updateInteraction() {
    if (interactionPoints.length === 0) {
      state.active = false;
      state.targetPull = lerp(state.targetPull, 0, 0.18);
      state.pinch = lerp(state.pinch, 0, 0.14);
      state.stretch = lerp(state.stretch, 0, 0.16);
      state.left.x = lerp(state.left.x, 0, 0.18);
      state.left.y = lerp(state.left.y, 0, 0.18);
      state.left.pull = lerp(state.left.pull, 0, 0.18);
      state.left.pinch = lerp(state.left.pinch, 0, 0.18);
      state.left.energy = lerp(state.left.energy, 0, 0.18);
      state.right.x = lerp(state.right.x, 0, 0.18);
      state.right.y = lerp(state.right.y, 0, 0.18);
      state.right.pull = lerp(state.right.pull, 0, 0.18);
      state.right.pinch = lerp(state.right.pinch, 0, 0.18);
      state.right.energy = lerp(state.right.energy, 0, 0.18);
      state.duoSpread = lerp(state.duoSpread, 0, 0.16);
      return;
    }

    state.active = true;
    const pts = interactionPoints;
    const weighted = pts.reduce((acc, p) => {
      const w = 0.5 + p.pullStrength + p.pinchStrength * 0.5;
      acc.x += p.x * w;
      acc.y += p.y * w;
      acc.w += w;
      return acc;
    }, { x: 0, y: 0, w: 0 });

    const centerX = weighted.x / Math.max(weighted.w, 0.001);
    const centerY = weighted.y / Math.max(weighted.w, 0.001);
    const dx = centerX - cx;
    const dy = centerY - cy;
    const dist = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);

    let pinch = 0;
    let stretch = 0;
    if (pts.length >= 2) {
      const d = Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y);
      pinch = clamp((d - blobRadius * 0.12) / (blobRadius * 1.8), 0, 1);
      const a1 = Math.atan2(pts[0].y - cy, pts[0].x - cx);
      const a2 = Math.atan2(pts[1].y - cy, pts[1].x - cx);
      stretch = clamp(Math.abs(angleDelta(a1, a2)) / Math.PI, 0, 1);
      state.duoSpread = lerp(state.duoSpread, clamp(d / (baseRadius * 3.2), 0, 1.2), 0.18);
    } else {
      state.duoSpread = lerp(state.duoSpread, 0, 0.2);
    }

    const pullMaxReach = Math.hypot(width, height) * 0.45;
    const pull = clamp(dist / pullMaxReach, 0, 1.55);
    const prevAngle = state.targetAngle;
    const prevPull = state.targetPull;

    state.targetAngle = angle;
    state.targetPull = lerp(state.targetPull, pull, 0.24);
    state.pull = lerp(state.pull, state.targetPull, 0.22);
    state.pinch = lerp(state.pinch, pinch, 0.2);
    state.stretch = lerp(state.stretch, stretch, 0.22);

    const radialDelta = state.targetPull - prevPull;
    const angularDelta = angleDelta(angle, prevAngle);
    state.radialVelocity = lerp(state.radialVelocity, radialDelta * 18, 0.3);
    state.tangentialVelocity = lerp(state.tangentialVelocity, angularDelta * 14, 0.34);
    const gestureImpulse = Math.min(1, Math.abs(state.radialVelocity) * 0.65 + Math.abs(state.tangentialVelocity) * 0.55);
    state.energy = clamp(lerp(state.energy, gestureImpulse, 0.18) * 0.985, 0, 1);
    state.detuneBias = lerp(state.detuneBias, state.tangentialVelocity * 9, 0.12);

    const leftPoint = pts.find((p) => p.handedness === "Left");
    const rightPoint = pts.find((p) => p.handedness === "Right");

    if (leftPoint) {
      state.left.x = lerp(state.left.x, leftPoint.normX, 0.28);
      state.left.y = lerp(state.left.y, leftPoint.normY, 0.28);
      state.left.pull = lerp(state.left.pull, leftPoint.pullStrength, 0.24);
      state.left.pinch = lerp(state.left.pinch, leftPoint.pinchStrength, 0.24);
      state.left.energy = lerp(state.left.energy, leftPoint.motion, 0.2);
    } else {
      state.left.x = lerp(state.left.x, 0, 0.18);
      state.left.y = lerp(state.left.y, 0, 0.18);
      state.left.pull = lerp(state.left.pull, 0, 0.18);
      state.left.pinch = lerp(state.left.pinch, 0, 0.18);
      state.left.energy = lerp(state.left.energy, 0, 0.18);
    }

    if (rightPoint) {
      state.right.x = lerp(state.right.x, rightPoint.normX, 0.28);
      state.right.y = lerp(state.right.y, rightPoint.normY, 0.28);
      state.right.pull = lerp(state.right.pull, rightPoint.pullStrength, 0.24);
      state.right.pinch = lerp(state.right.pinch, rightPoint.pinchStrength, 0.24);
      state.right.energy = lerp(state.right.energy, rightPoint.motion, 0.2);
    } else {
      state.right.x = lerp(state.right.x, 0, 0.18);
      state.right.y = lerp(state.right.y, 0, 0.18);
      state.right.pull = lerp(state.right.pull, 0, 0.18);
      state.right.pinch = lerp(state.right.pinch, 0, 0.18);
      state.right.energy = lerp(state.right.energy, 0, 0.18);
    }
  }

  function applyBlobPhysics() {
    const pullStrength = state.pull;
    const pinchBoost = state.pinch;
    const energyBoost = state.energy;
    blobRadius = lerp(blobRadius, baseRadius * (1 + pullStrength * 0.12 + pinchBoost * 0.03 + state.duoSpread * 0.04), 0.08);
    innerRadius = lerp(innerRadius, baseRadius * (0.64 - pinchBoost * 0.09 + energyBoost * 0.03), 0.08);

    for (const node of nodes) {
      let target = 0;

      for (const point of interactionPoints) {
        const d = angleDelta(node.angle, point.angle);
        const focusWidth = 0.06 + point.pinchStrength * 0.08 + state.stretch * 0.1;
        const focus = Math.exp(-(d * d) / focusWidth);

        /* The blob surface should reach the pinch point.
           pixelDist is the raw distance from center to pinch;
           we want the node displacement to bridge that gap. */
        const reachDisp = Math.max(0, point.pixelDist - blobRadius);
        const dragLobe = focus * reachDisp * (0.9 + point.pinchStrength * 0.4);

        const counterLobe = Math.exp(-((Math.abs(Math.abs(d) - Math.PI)) ** 2) / 0.28) * (-reachDisp * 0.15 * focus);
        const ripple = Math.sin(d * (3 + point.motion * 2.4) - time * 0.08) * point.motion * 10;
        target += dragLobe + counterLobe + ripple;
      }

      target += Math.sin((node.angle + time * 0.01) * 2) * state.duoSpread * 3;

      node.vel += (target - node.disp) * 0.14;
      node.vel += -node.disp * 0.012;
      node.vel *= 0.82;
      node.disp += node.vel;
    }

    for (let i = 0; i < nodes.length; i++) {
      const prev = nodes[(i - 1 + nodes.length) % nodes.length];
      const next = nodes[(i + 1) % nodes.length];
      nodes[i].disp += (prev.disp + next.disp - 2 * nodes[i].disp) * 0.16;
    }
  }

  function updateAudio() {
    if (!started || !audioCtx) return;
    const now = audioCtx.currentTime;
    const globalPull = clamp(state.pull, 0, 1.55);
    const globalPinch = state.pinch;
    const globalEnergy = state.energy;

    const leftX = state.left.x;
    const leftY = state.left.y;
    const leftPull = state.left.pull;
    const leftPinch = state.left.pinch;
    const leftEnergy = state.left.energy;

    const rightX = state.right.x;
    const rightY = state.right.y;
    const rightPull = state.right.pull;
    const rightPinch = state.right.pinch;
    const rightEnergy = state.right.energy;

    /* === NEW PARAMETER MAPPING ===
       Blue (left hand, left side of screen):
         X: Cutoff frequency. leftX ranges -1.2 (far left) to ~0 (center).
            Map so far left = 20 Hz (closed), near center = 10,000 Hz (open).
         Y: Reverb. top (-1.2) = dry, bottom (+1.2) = fully wet.
         Pull: resonance boost, LFO depth
         Pinch: resonance spike

       Amber (right hand, right side of screen):
         X: Detune. rightX ranges ~0 (center) to +1.2 (far right).
            Map so center = 0 ct, far right = +50 ct.
         Y: Grit/distortion. top (-1.2) = max grit, bottom (+1.2) = clean.
         Pull: volume boost, drone lift
         Pinch: extra grit, resonance via voice detune
    */

    // BLUE X → Cutoff: leftX from -1.2 (closed) to 0 (open)
    const cutoffNorm = clamp((leftX + 1.2) / 1.2, 0, 1); // 0 at far left, 1 near center
    const cutoffDrive = clamp(cutoffNorm + leftPinch * 0.08, 0, 1);
    const cutoff = 20 + Math.pow(cutoffDrive, 2.2) * 9980;

    // BLUE Y → Reverb: leftY from -1.2 (dry) to +1.2 (wet)
    const shimmerWet = clamp((leftY + 1.2) / 2.4, 0, 1);

    // Resonance from pinch + energy
    const resonance = 0.75 + leftPinch * 13 + leftEnergy * 4.6 + state.duoSpread * 2.4;

    // AMBER Y → Grit: rightY from -1.2 (max grit) to +1.2 (clean)
    const gritNorm = clamp(1.0 - (rightY + 1.2) / 2.4, 0, 1); // 1 at top, 0 at bottom
    const grit = clamp(0.04 + gritNorm * 0.72 + rightPinch * 0.24, 0.02, 1);

    // AMBER X → Detune: rightX from ~0 (center, 0ct) to +1.2 (far right, +50ct)
    const detuneNorm = clamp(rightX / 1.2, 0, 1); // 0 near center, 1 at far right
    const detune = Math.round(detuneNorm * 50 + state.detuneBias * 0.8 + rightEnergy * 12);

    // Pan follows both hands mildly
    const pan = clamp(rightX * 0.5 + leftX * 0.5, -1, 1);

    const lfoRate = 0.06 + leftEnergy * 0.34 + rightEnergy * 0.48 + state.duoSpread * 0.32;
    const lfoAmt = 3 + leftPull * 16 + rightEnergy * 11 + state.duoSpread * 12;
    const droneLift = state.duoSpread * 12 + rightPull * 6 + globalPull * 3;

    filter1.frequency.setTargetAtTime(cutoff, now, 0.04);
    filter2.frequency.setTargetAtTime(cutoff * (1.5 + leftPull * 0.6), now, 0.05);
    filter1.Q.setTargetAtTime(resonance, now, 0.05);
    filter2.Q.setTargetAtTime(Math.min(resonance * 0.4, 8), now, 0.05);
    shimmerSend.gain.setTargetAtTime(shimmerWet, now, 0.06);
    dryGain.gain.setTargetAtTime(Math.max(0, 1 - shimmerWet), now, 0.06);
    stereoPanner.pan.setTargetAtTime(pan, now, 0.08);
    lfo.frequency.setTargetAtTime(lfoRate, now, 0.08);
    lfoDepth.gain.setTargetAtTime(lfoAmt, now, 0.08);
    waveshaper.curve = makeDistortionCurve(grit);

    const baseFreq = 68 + droneLift;
    droneVoices[0].osc.frequency.setTargetAtTime(baseFreq, now, 0.08);
    droneVoices[1].osc.frequency.setTargetAtTime(baseFreq * (1.498 + state.duoSpread * 0.028), now, 0.08);
    droneVoices[2].osc.frequency.setTargetAtTime(baseFreq * (1.996 + leftPull * 0.034), now, 0.08);
    droneVoices[0].osc.detune.setTargetAtTime(detune * 0.6, now, 0.05);
    droneVoices[1].osc.detune.setTargetAtTime(-detune * 0.3 + globalPinch * 14, now, 0.05);
    droneVoices[2].osc.detune.setTargetAtTime(detune * 0.28 + globalEnergy * 11, now, 0.05);
    bodyGain.gain.setTargetAtTime(0.18 + globalPull * 0.12 + globalEnergy * 0.08 + state.duoSpread * 0.05, now, 0.08);
    masterGain.gain.setTargetAtTime(0.5 + globalPull * 0.08, now, 0.1);

    setText("cutoffVal", Math.round(cutoff) + " Hz");
    setText("reverbVal", Math.round(shimmerWet * 100) + "%");
    setText("gritVal", Math.round(grit * 100) + "%");
    setText("detuneVal", detune + " ct");
  }

  function drawBlob() {
    const gradient = ctx.createRadialGradient(cx, cy, innerRadius * 0.2, cx, cy, blobRadius * 1.35);
    gradient.addColorStop(0, "rgba(164, 229, 255, 0.34)");
    gradient.addColorStop(0.36, "rgba(110, 178, 255, 0.18)");
    gradient.addColorStop(0.68, "rgba(124, 246, 216, 0.1)");
    gradient.addColorStop(1, "rgba(124, 246, 216, 0.02)");

    ctx.beginPath();
    for (let i = 0; i < nodes.length; i++) {
      const node = nodes[i];
      const r = blobRadius + node.disp;
      const x = cx + Math.cos(node.angle) * r;
      const y = cy + Math.sin(node.angle) * r;
      if (i === 0) {
        ctx.moveTo(x, y);
      } else {
        const prev = nodes[i - 1];
        const prevR = blobRadius + prev.disp;
        const px = cx + Math.cos(prev.angle) * prevR;
        const py = cy + Math.sin(prev.angle) * prevR;
        const mx = (px + x) * 0.5;
        const my = (py + y) * 0.5;
        ctx.quadraticCurveTo(px, py, mx, my);
      }
    }
    const first = nodes[0];
    const firstR = blobRadius + first.disp;
    const firstX = cx + Math.cos(first.angle) * firstR;
    const firstY = cy + Math.sin(first.angle) * firstR;
    const last = nodes[nodes.length - 1];
    const lastR = blobRadius + last.disp;
    const lastX = cx + Math.cos(last.angle) * lastR;
    const lastY = cy + Math.sin(last.angle) * lastR;
    ctx.quadraticCurveTo(lastX, lastY, firstX, firstY);
    ctx.closePath();

    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.lineWidth = 1.4;
    ctx.strokeStyle = "rgba(196, 235, 255, 0.62)";
    ctx.shadowColor = "rgba(124, 246, 216, 0.25)";
    ctx.shadowBlur = 30;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.beginPath();
    ctx.arc(cx, cy, innerRadius, 0, TAU);
    ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
    ctx.stroke();

    if (state.active) {
      const r = blobRadius + Math.max(0, state.pull) * baseRadius * 0.95;
      const x = cx + Math.cos(state.targetAngle) * r;
      const y = cy + Math.sin(state.targetAngle) * r;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(x, y);
      ctx.strokeStyle = "rgba(255, 199, 123, 0.28)";
      ctx.setLineDash([8, 10]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.arc(x, y, 8 + state.energy * 12, 0, TAU);
      ctx.fillStyle = "rgba(255, 199, 123, 0.35)";
      ctx.fill();
    }
  }

  function drawHands() {
    for (const point of interactionPoints) {
      ctx.beginPath();
      ctx.arc(point.x, point.y, 10 + point.pinchStrength * 8, 0, TAU);
      ctx.fillStyle = point.handedness === "Left"
        ? "rgba(110, 178, 255, 0.34)"
        : "rgba(255, 199, 123, 0.4)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(point.x, point.y, 20 + point.pinchStrength * 16, 0, TAU);
      ctx.lineWidth = 1;
      ctx.strokeStyle = point.handedness === "Left"
        ? "rgba(110, 178, 255, 0.68)"
        : "rgba(255, 199, 123, 0.62)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(point.thumbX, point.thumbY);
      ctx.lineTo(point.indexX, point.indexY);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 127, 142, 0.42)";
      ctx.stroke();
    }
  }

  function drawAura() {
    const pulse = 0.5 + Math.sin(time * 0.02) * 0.5;
    const ringCount = 4;
    for (let i = 0; i < ringCount; i++) {
      const t = i / (ringCount - 1);
      const radius = baseRadius * (1.18 + t * 0.6 + pulse * 0.02) + state.energy * 18;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, TAU);
      ctx.lineWidth = 1;
      ctx.strokeStyle = `rgba(126, 208, 255, ${0.12 - t * 0.025})`;
      ctx.stroke();
    }
  }

  function render() {
    time += 1;
    updateInteraction();
    applyBlobPhysics();
    updateAudio();

    ctx.clearRect(0, 0, width, height);
    drawAura();
    drawBlob();
    drawHands();

    requestAnimationFrame(render);
  }

  function pinchDist(lm) {
    return Math.sqrt(
      (lm[4].x - lm[8].x) ** 2 +
      (lm[4].y - lm[8].y) ** 2 +
      (lm[4].z - lm[8].z) ** 2
    );
  }

  function screenPoint(lm) {
    return {
      x: (1 - lm.x) * width,
      y: lm.y * height
    };
  }

  function collectInteractionPoints(results) {
    interactionPoints.length = 0;
    if (!results.landmarks || !results.landmarks.length) return;

    /* Compute the half-extents for normalization based on screen size,
       so parameters span the full x/y axes instead of clamping early. */
    const halfW = width * 0.45;
    const halfH = height * 0.45;

    /* Max reach for pullStrength: use half the screen diagonal so
       dragging all the way to the edge gives full range */
    const maxReach = Math.hypot(width, height) * 0.45;

    for (let i = 0; i < results.landmarks.length; i++) {
      const lm = results.landmarks[i];
      const pinch = pinchDist(lm);
      const pinchStrength = clamp(1.3 - pinch * 5.8, 0, 1);
      const thumb = screenPoint(lm[4]);
      const index = screenPoint(lm[8]);
      const pinchX = (thumb.x + index.x) * 0.5;
      const pinchY = (thumb.y + index.y) * 0.5;
      const handedness = results.handednesses?.[i]?.[0]?.categoryName || (pinchX < cx ? "Left" : "Right");
      const key = handedness;

      /* Hysteresis: grab threshold is tight, release threshold is loose.
         Once gripped, you stay engaged until fingers open wide. */
      const wasGripped = gripState.get(key) || false;
      const grabThreshold = 0.18;
      const releaseThreshold = 0.08;
      const engaged = wasGripped
        ? pinchStrength > releaseThreshold
        : pinchStrength > grabThreshold;
      gripState.set(key, engaged);

      const prev = pointMemory.get(key);
      const vx = prev ? pinchX - prev.x : 0;
      const vy = prev ? pinchY - prev.y : 0;
      const speed = Math.hypot(vx, vy);
      const dx = pinchX - cx;
      const dy = pinchY - cy;
      const dist = Math.hypot(dx, dy);
      const angle = Math.atan2(dy, dx);
      /* pullStrength now scales against screen diagonal, not baseRadius */
      const pullStrength = clamp(dist / maxReach, 0, 1.55);

      const pinchPoint = {
        x: pinchX,
        y: pinchY,
        thumbX: thumb.x,
        thumbY: thumb.y,
        indexX: index.x,
        indexY: index.y,
        handedness,
        angle,
        normX: clamp(dx / halfW, -1.2, 1.2),
        normY: clamp(dy / halfH, -1.2, 1.2),
        pullStrength,
        /* pixelDist: raw pixel distance from blob center, used
           to extend the blob all the way to the pinch point */
        pixelDist: dist,
        motion: clamp(speed / 26, 0, 1),
        pinchStrength,
        engaged
      };

      pointMemory.set(key, { x: pinchX, y: pinchY });

      if (pinchPoint.engaged) {
        interactionPoints.push(pinchPoint);
      }
    }

    for (const key of Array.from(pointMemory.keys())) {
      if (!interactionPoints.some((point) => point.handedness === key)) {
        pointMemory.delete(key);
        gripState.set(key, false);
      }
    }
  }

  function detectHands() {
    if (!isRunning) return;
    if (video.readyState >= 2) {
      const results = handLandmarker.detectForVideo(video, performance.now());
      collectInteractionPoints(results);
      if (interactionPoints.length > 0) {
        lastHandTime = performance.now();
      } else if (performance.now() - lastHandTime > 240) {
        interactionPoints.length = 0;
      }
    }
    requestAnimationFrame(detectHands);
  }

  async function initHandTracking() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2
    });
  }

  async function initCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: "user" },
      audio: false
    });
    video.srcObject = stream;
    return new Promise((resolve) => {
      video.onloadedmetadata = async () => {
        await video.play();
        resolve();
      };
    });
  }

  window.addEventListener("resize", resize);

  document.getElementById("startBtn").addEventListener("click", async () => {
    const btn = document.getElementById("startBtn");
    btn.disabled = true;
    btn.textContent = "Starting...";
    try {
      await initCamera();
      await initHandTracking();
      if (!audioCtx) initAudio();
      await audioCtx.resume();
      started = true;
      isRunning = true;
      lastHandTime = performance.now();
      detectHands();
      document.getElementById("startOverlay").style.display = "none";
    } catch (error) {
      btn.disabled = false;
      btn.textContent = "Retry";
      console.error(error);
    }
  });

  resize();
  render();
</script>
</body>
</html>
